plugins {
    id "klum-ast.base-conventions"
    id "java-library"
    id 'groovy'
    id 'signing'
    id 'maven-publish'
    id 'com.github.hierynomus.license'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    withJavadocJar()
    withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs << '-parameters'
}

tasks.withType(GroovyCompile).configureEach {
    groovyOptions.optimizationOptions.groovydoc = true
    groovyOptions.parameters = true
}

dependencies {
    compileOnly libs.jb.anno
    compileOnly libs.groovy.v3
    compileOnly platform(libs.groovy.v3.bom)

    testImplementation libs.jb.anno
    testImplementation 'uk.org.webcompere:system-stubs-core:2.1.8'

    testRuntimeOnly libs.bundles.spockRuntime
    testRuntimeOnly libs.jpl
}
