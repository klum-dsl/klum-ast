name: Publish protected release

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "The independently authorized release stage"
        required: true
        type: choice
        options:
          - candidate
          - final
      version:
        description: "Exact immutable version to publish, for example 4.0.0-rc.1"
        required: true
        type: string
      commit:
        description: "Full source commit SHA on master"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate-release-input:
    name: Validate release stage and version
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.select-environment.outputs.name }}

    steps:
      - id: select-environment
        env:
          RELEASE_STAGE: ${{ inputs.stage }}
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RELEASE_STAGE" == candidate && "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[1-9][0-9]*$ ]]; then
            echo 'name=release-candidate' >> "$GITHUB_OUTPUT"
          elif [[ "$RELEASE_STAGE" == final && "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo 'name=final-release' >> "$GITHUB_OUTPUT"
          else
            echo 'The selected stage does not match the exact immutable version.' >&2
            exit 1
          fi

  stage-pending-documentation:
    name: Stage pending documentation for ${{ inputs.version }}
    needs: validate-release-input
    permissions:
      contents: write
    uses: ./.github/workflows/publish-pending-documentation.yml
    with:
      stage: ${{ inputs.stage }}
      version: ${{ inputs.version }}
      commit: ${{ inputs.commit }}

  publish:
    name: Publish ${{ inputs.stage }} ${{ inputs.version }}
    needs: [validate-release-input, stage-pending-documentation]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: ${{ needs.validate-release-input.outputs.environment }}
    env:
      KLUM_AST_RELEASE_AUTHORIZED: ${{ inputs.stage }}
      ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
      ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
      ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
      GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
      GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.commit }}
      - name: Verify the authorized source commit
        env:
          EXPECTED_COMMIT: ${{ inputs.commit }}
        shell: bash
        run: |
          set -euo pipefail
          actual_commit=$(git rev-parse HEAD)
          test "$actual_commit" = "$EXPECTED_COMMIT"
          git merge-base --is-ancestor "$actual_commit" origin/master
          test -z "$(git status --porcelain=v1)"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - name: Reject an already used version or tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git show-ref --verify --quiet "refs/tags/v${{ inputs.version }}" && {
            echo "The release tag already exists; published versions are never retried in place." >&2
            exit 1
          }
          gh release view "v${{ inputs.version }}" >/dev/null 2>&1 && {
            echo "The GitHub release already exists; published versions are never retried in place." >&2
            exit 1
          }
      - name: Require every protected credential before publication
        shell: bash
        run: |
          set -euo pipefail
          for credential in \
            ORG_GRADLE_PROJECT_sonatypeUsername \
            ORG_GRADLE_PROJECT_sonatypePassword \
            ORG_GRADLE_PROJECT_signingKey \
            ORG_GRADLE_PROJECT_signingPassword \
            GRADLE_PUBLISH_KEY \
            GRADLE_PUBLISH_SECRET
          do
            test -n "${!credential}" || {
              echo "The protected release environment is missing $credential." >&2
              exit 1
            }
          done
      - name: Recheck the pending documentation handoff
        env:
          DOCUMENTATION_STAGE: ${{ needs.stage-pending-documentation.outputs.stage }}
          DOCUMENTATION_VERSION: ${{ needs.stage-pending-documentation.outputs.version }}
          DOCUMENTATION_COMMIT: ${{ needs.stage-pending-documentation.outputs.commit }}
          DOCUMENTATION_EXACT_PATH: ${{ needs.stage-pending-documentation.outputs.exact_path }}
          DOCUMENTATION_MANIFEST_SHA256: ${{ needs.stage-pending-documentation.outputs.manifest_sha256 }}
          DOCUMENTATION_DEPLOYMENT_COMMIT: ${{ needs.stage-pending-documentation.outputs.deployment_commit }}
          DOCUMENTATION_DEPLOYMENT_ID: ${{ needs.stage-pending-documentation.outputs.deployment_id }}
          DOCUMENTATION_PAGE_URL: ${{ needs.stage-pending-documentation.outputs.page_url }}
        shell: bash
        run: |
          set -euo pipefail
          test "$DOCUMENTATION_STAGE" = "${{ inputs.stage }}"
          test "$DOCUMENTATION_VERSION" = "${{ inputs.version }}"
          test "$DOCUMENTATION_COMMIT" = "${{ inputs.commit }}"
          test "$DOCUMENTATION_EXACT_PATH" = "pending/${{ inputs.version }}/${{ inputs.commit }}/"
          [[ "$DOCUMENTATION_MANIFEST_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$DOCUMENTATION_DEPLOYMENT_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$DOCUMENTATION_DEPLOYMENT_ID" =~ ^[0-9]+\.[0-9]+$ ]]
          [[ "$DOCUMENTATION_PAGE_URL" =~ ^https:// ]]
      - name: Verify, sign, stage, and publish the complete product
        run: >-
          ./gradlew ${{ inputs.stage }} publishCompleteKlumAstProduct
          -PreleaseExpectedVersion=${{ inputs.version }}
          -PreleaseStage=${{ inputs.stage }}
