name: CI

on:
  push:
    branches: [ main, master, release/* ]
  pull_request:
    branches: [ main, master, release/* ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: |
            17
          distribution: 'adopt'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache SonarCloud packages
        uses: actions/cache@v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Build with Gradle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run:
          ./gradlew check --scan sonar --info
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: '**/build/test-results/*/TEST-*.xml'
          check_name: 'JUnit Test Report'
      - name: Archive compatibility-lane evidence
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: compatibility-lane-evidence
          path: |
            **/build/test-results/groovy4Tests/TEST-*.xml
            **/build/test-results/groovy5Tests/TEST-*.xml
            code-coverage-report/build/reports/jacoco/groovy4CodeCoverageReport/**
            code-coverage-report/build/reports/jacoco/groovy5CodeCoverageReport/**
          if-no-files-found: error
      - name: Archive test classes
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test classes
          path: |
            **/build/test-classes/**/*.class
